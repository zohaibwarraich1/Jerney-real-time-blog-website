name: Backend CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

env:
  DOCKER_IMAGE: zohaibwarraich/jerney-backend

jobs:
  setup:
    name: Create tag for image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate Image Tag
        id: tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          IMAGE_TAG="v${{ github.run_number }}-${SHORT_SHA}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache Node Modules
        uses: actions/cache@v5
        with:
          path: backend/node_modules
          key: node_modules-${{ hashFiles('backend/package.json') }}

      - name: Build Backend using Nodejs
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Build
        working-directory: backend
        run: npm install

      - name: Compilation
        working-directory: backend
        run: npm run build --if-present
    # - name: Test
    #   run: npm test
    #   working-directory: backend

  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: build_and_test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Verify Java
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version

      - name: Restore Cache Node Modules
        uses: actions/cache/restore@v5
        with:
          path: backend/node_modules
          key: node_modules-${{ hashFiles('backend/package.json') }}

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "jerney-backend"
          path: "backend"
          format: "HTML"
          out: "dependency-check-reports"
          args: >
            --failOnCVSS 7
            --nvdApiKey ${{ secrets.NVD_API_KEY }}

      - name: Upload Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: dependency-check-report
          path: dependency-check-reports/
          
  code-quality-analysis:
    name: Sonarqube Code Quality Analysis
    runs-on: ubuntu-latest
    needs: build_and_test
      
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0    # it is required, sonarqube asks for full git history.
          
      - name: Restore Cache Node Modules
        uses: actions/cache/restore@v5
        with:
          path: backend/node_modules
          key: node_modules-${{ hashFiles('backend/package.json') }}
          
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        with:
          projectBaseDir: backend
          args: >
            -Dsonar.organization=zohaibwarraich1
            -Dsonar.projectName=Jerney-real-time-blog-website-Backend
            -Dsonar.projectKey=Jerney-real-time-blog-website-Backend
            -Dsonar.sources=src
            -Dsonar.exclusions=node_modules/**,dist/**,coverage/**
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.sourceEncoding=UTF-8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: SonarQube Quality Gate check
        id: sonarqube-quality-gate-check
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 10
        with:
          pollingTimeoutSec: 600
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: "SonarQube Quality Gate Status value"
        run: echo "The Quality Gate status is ${{ steps.sonarqube-quality-gate-check.outputs.quality-gate-status }}"
        
  docker-build-and-trivy-scan:
    name: Build Docker Image and Trivy Scan
    runs-on: ubuntu-latest
    needs: [code-quality-analysis, dependency-check]
      
    steps:
      - name: Checkout
        uses: actions/checkout@v6
          
      - name: Build Image
        uses: docker/build-push-action@v7
        with:
          context: ./backend/
          file: ./backend/Dockerfile
          push: false
          load: true # build image and save to local docker daemon. So that it can be used for trivy scan.
          tags: jerney-backend:local

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: jerney-backend:local
          format: 'sarif'
          output: 'backend-trivy-results.sarif'
          exit-code: '1'
          ignore-unfixed: true
          scan-type: 'image'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'backend-trivy-results.sarif'
          
  docker-push:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: docker-build-and-trivy-scan
      
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./backend/
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:v${{ github.run_number }}

  update-manifests:
    name: Update Manifest & Helm Values
    runs-on: ubuntu-latest
    needs: docker-push
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GIT_TOKEN }}
 
      - name: Update Deployment Manifest & Helm Values
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          
          IMAGE_TAG="${{ needs.setup.outputs.image_tag }}"
          
          # Update Deployment Manifest
          sed -i "s|image: ${{ env.DOCKER_IMAGE }}:.*|image: ${{ env.DOCKER_IMAGE }}:${IMAGE_TAG}|g" \
            k8s/backend/deployment.yaml

          sed -i "/repository: zohaibwarraich\/jerney-backend/{n;s/tag: .*/tag: \"${IMAGE_TAG}\"/;}" \
            helm/values.yaml
 
          git add k8s/backend/deployment.yaml helm/values.yaml
          git commit -m "Update backend image tag to ${IMAGE_TAG} in helm values.yaml and k8s manifests [skip ci]" || echo "No changes to commit"
          git push
