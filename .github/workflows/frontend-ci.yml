name: Frontend CI/CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"

env:
  DOCKER_IMAGE: zohaibwarraich/jerney-frontend

jobs:
  setup:
    name: Create tag for image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate Image Tag
        id: tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          IMAGE_TAG="v${{ github.run_number }}-${SHORT_SHA}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Cache Node Modules
        uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: node_modules-${{ hashFiles('frontend/package.json') }}

      - name: Build Frontend using Nodejs
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build
        working-directory: frontend
        run: npm install

      - name: Compilation
        working-directory: frontend
        run: npm run build --if-present
    # - name: Test
    #   run: npm test
    #   working-directory: frontend

  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: build_and_test
    environment: Production
    permissions: 
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore Cache Node Modules
        uses: actions/cache/restore@v5
        with:
          path: frontend/node_modules
          key: node_modules-${{ hashFiles('frontend/package.json') }}

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "jerney-frontend"
          path: "frontend"
          format: "SARIF"
          out: "dependency-check-reports-frontend"
          args: >
            --failOnCVSS 7
            --nvdApiKey ${{ secrets.NVD_API_KEY }}

      - name: Upload OWASP Reports to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: ${{ github.workspace }}/dependency-check-reports-frontend/dependency-check-report.sarif

  code-quality-analysis:
    name: Sonarqube Code Quality Analysis
    runs-on: ubuntu-latest
    needs: build_and_test
    environment: Production
    permissions: 
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # it is required, sonarqube asks for full git history.

      - name: Restore Cache Node Modules
        uses: actions/cache/restore@v5
        with:
          path: frontend/node_modules
          key: node_modules-${{ hashFiles('frontend/package.json') }}

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7.1.0
        with:
          projectBaseDir: frontend
          args: >
            -Dsonar.organization=zohaibwarraich1
            -Dsonar.projectName=zohaibwarraich1_Jerney-real-time-blog-website
            -Dsonar.projectKey=zohaibwarraich1_Jerney-real-time-blog-website
            -Dsonar.sources=src
            -Dsonar.exclusions=node_modules/**,dist/**,coverage/**
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.sourceEncoding=UTF-8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: SonarQube to GitHub Security Tab (SARIF)
        uses: vmvarela/sonarqube-sarif@v1.2.0
        with:
          sonar-token: ${{ secrets.SONAR_TOKEN }}
          sonar-host-url: https://sonarcloud.io
          project-key: 'zohaibwarraich1_Jerney-real-time-blog-website'
          output-file: sonarqube-results-frontend.sarif

      - name: Upload SonarQube Results to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: ${{ github.workspace }}/sonarqube-results-frontend.sarif

      - name: SonarQube Quality Gate check
        id: sonarqube-quality-gate-check
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        timeout-minutes: 10
        with:
          pollingTimeoutSec: 600
          scanMetadataReportFile: frontend/.scannerwork/report-task.txt
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: "SonarQube Quality Gate Status value"
        run: echo "The Quality Gate status is ${{ steps.sonarqube-quality-gate-check.outputs.quality-gate-status }}"

  docker-build-and-trivy-scan:
    name: Build Docker Image and Trivy Scan
    runs-on: ubuntu-latest
    needs: [code-quality-analysis, dependency-check]
    environment: Production
    permissions:
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend/
          file: ./frontend/Dockerfile
          push: false
          load: true # build image and save to local docker daemon. So that it can be used for trivy scan.
          tags: jerney-frontend:local

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: jerney-frontend:local
          format: "sarif"
          output: "frontend-trivy-results.sarif"
          exit-code: "0"
          ignore-unfixed: true
          scan-type: "image"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'frontend-trivy-results.sarif'

  docker-push:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: [docker-build-and-trivy-scan, setup]
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./frontend/
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.DOCKER_IMAGE }}:${{ needs.setup.outputs.image_tag }}

  update-manifests:
    name: Update Manifest & Helm Values
    runs-on: ubuntu-latest
    needs: [docker-push, setup]
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GIT_TOKEN }}

      - name: Update Deployment Manifest & Helm Values
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

          IMAGE_TAG="${{ needs.setup.outputs.image_tag }}"

          # Update Deployment Manifest
          sed -i "s|image: ${{ env.DOCKER_IMAGE }}:.*|image: ${{ env.DOCKER_IMAGE }}:${IMAGE_TAG}|g" \
            k8s/frontend/deployment.yaml

          sed -i "/repository: zohaibwarraich\/jerney-frontend/{n;s/tag: .*/tag: \"${IMAGE_TAG}\"/;}" \
            helm/values.yaml

          git add k8s/frontend/deployment.yaml helm/values.yaml
          git commit -m "Update frontend image tag to ${IMAGE_TAG} in helm values.yaml and k8s manifests [skip ci]" || echo "No changes to commit"

          # Retry push up to 3 times to handle race condition with backend workflow
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
