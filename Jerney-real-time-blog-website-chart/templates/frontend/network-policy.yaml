{{- if .Values.frontendNetworkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Values.frontendNetworkPolicy.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "Jerney-real-time-blog-website-chart.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Values.frontendDeployment.podName }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: {{ .Values.frontendService.port }}
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: {{ .Values.backendDeployment.podName }}
      ports:
        - protocol: TCP
          port: {{ .Values.backendService.port }}    
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}