apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: jerney-http-route
  namespace: jerney-ns
  labels:
    app: jerney-router
  annotations:
    description: "Routing rules for Jerney frontend and backend"
spec:
  parentRefs:
    - name: jerney-gateway 
      sectionName: https
  
  hostnames:
    - "jerney.zohaibofficial.online"

  rules:
    # Backend Rule: Route /api requests to the backend service
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: backend-service
          port: 5000
          weight: 1

    # Frontend Rule: Route everything else to the frontend service
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend-service
          port: 80
          weight: 1
