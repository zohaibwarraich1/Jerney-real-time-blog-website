apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: jerney-ns
  labels:
    app: jerney-backend
  annotations:
    description: "ClusterIP Service exposing the Jerney backend internally"
spec:
  type: ClusterIP

  selector:
    app: backend-pod
    
  ports:
    - name: tcp
      port: 5000
      targetPort: 5000 
      protocol: TCP