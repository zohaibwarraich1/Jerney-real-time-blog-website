apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: database-statefulset
  namespace: jerney-ns
  labels:
    app: jerney-database
    environment: prod
  annotations:
    description: "Postgres database StatefulSet for Jerney blog"
spec:
  serviceName: "database-service"
  replicas: 1 # For Postgres, start with 1. Clustering requires setup like Patroni/BDR
  selector:
    matchLabels:
      app: database-pods
  template:
    metadata:
      labels:
        app: database-pods
    spec:
      # Optional: Security Context at the pod level
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999 # Important for persistent volumes permissions
      
      initContainers:
        - name: fix-permissions
          image: busybox
          command: ["sh", "-c", "chown -R 999:999 /var/lib/postgresql/data"]
          securityContext:
            runAsUser: 0 # Run as root to change ownership
          volumeMounts:
            - name: database-pvc
              mountPath: /var/lib/postgresql/data
              subPath: data

      containers:
        - name: postgres-container
          image: postgres:15
          imagePullPolicy: IfNotPresent
          
          # Container specific security context
          securityContext:
            allowPrivilegeEscalation: false
          
          ports:
            - name: postgres-port
              containerPort: 5432
          
          envFrom:
            - secretRef:
                name: database-secret
            
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"

          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - admin
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - admin
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
            
          volumeMounts:
            - name: database-pvc
              mountPath: /var/lib/postgresql/data
              subPath: data # Avoids lost+found error on EBS
            - name: pg-run-sockets  
              mountPath: /var/run/postgresql
            - name: pg-tmp-files   
              mountPath: /tmp
            # Optional Mount custom initialization scripts
            # - name: init-scripts
            #   mountPath: /docker-entrypoint-initdb.d
          
      # Optional for Volumes that are not PersistentVolumeClaims (like ConfigMaps/Secrets)
      volumes:
        - name: pg-tmp-files 
          emptyDir: {}
        - name: pg-run-sockets
          emptyDir: {}
      #   - name: init-scripts
      #     configMap:
      #       name: db-init-script

  volumeClaimTemplates:
    - metadata:
        name: database-pvc
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: "ebs-sc" 
        resources:
          requests:
            storage: 2Gi