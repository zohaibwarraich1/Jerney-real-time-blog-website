{{- if .Values.infrastructure.clusterIssuer.enabled -}}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.infrastructure.clusterIssuer.name | quote }}
  labels:
    {{- include "Jerney-real-time-blog-website-chart.labels" . | nindent 4 }}
spec:
  acme:
    email: {{ .Values.infrastructure.clusterIssuer.email | quote }}
    {{- if .Values.infrastructure.clusterIssuer.useStaging }}
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    {{- else }}
    server: https://acme-v02.api.letsencrypt.org/directory
    {{- end }}
    privateKeySecretRef:
      name: letsencrypt-acc-key
    solvers:
      - dns01:
          route53:
            region: {{ .Values.infrastructure.clusterIssuer.region | quote }}
{{- end }}