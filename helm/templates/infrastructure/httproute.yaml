{{- if .Values.infrastructure.gateway.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.infrastructure.httpRoutes.name | quote }}
  namespace: {{ .Values.global.namespace | quote }}
  labels:
    {{- include "Jerney-real-time-blog-website-chart.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.infrastructure.gateway.name | quote }}
      sectionName: http
    - name: {{ .Values.infrastructure.gateway.name | quote }}
      sectionName: https
  {{- with .Values.infrastructure.certificate.dnsNames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.infrastructure.httpRoutes.backendPath | quote }}
      backendRefs:
        - name: {{ .Values.backendService.name | quote }}
          port: {{ .Values.backendService.port }}
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.infrastructure.httpRoutes.frontendPath | quote }}
      backendRefs:
        - name: {{ .Values.frontendService.name | quote }}
          port: {{ .Values.frontendService.port }}
          weight: 1
{{- end }}
